name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Bot to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH and Restart Docker
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Navigate to the bot directory (friend must place the bot here or change this path)
            cd /opt/gd_bot
            
            # Pull latest changes from main
            git pull origin main
            
            # Rebuild and restart the Docker container
            docker build -t gd_bot .
            docker stop gd_bot || true
            docker rm gd_bot || true
            docker run -d --restart unless-stopped --name gd_bot --env-file .env -v $(pwd)/data:/app/data gd_bot
